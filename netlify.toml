[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "CLOUDINARY_CLOUD_NAME"   # ← tells scanner: "rahima" in URLs is fine

[functions]
  node_bundler = "esbuild"
  included_files = ["views/**"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
