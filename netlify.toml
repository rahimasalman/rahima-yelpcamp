[build]
  command = "npm install"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "CLOUDINARY_CLOUD_NAME"   # ← tells scanner: "rahima" in URLs is fine

[functions]
  node_bundler = "esbuild"                            # ← back to esbuild (nft silently failed)
  included_files = ["views/**"]                       # ← EJS templates bundled with the function
  external_node_modules = ["mongoose", "mongodb"]    # ← skip native modules, deploy as-is

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
